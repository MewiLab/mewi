        run: uv run python evals/run_eval.py --eval_type backend

      - name: Upload results to S3
        if: always()
        run: |
          aws s3 cp \
            ./backend/evals/backend/results/ \
            s3://mewi-eval-result-v0/runs/${{ github.sha }}/ \
            --recursive