# .github/workflows/ci-integration.yml
# ──────────────────────────────────────────────────────────────
# Integration tests against real Supabase + Redis.
# Runs on main push OR manual trigger. Costs ~$0.001 per run.
# ──────────────────────────────────────────────────────────────
name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/app/**"          # catch everything under app/
      - "backend/tests/integration/**"  # also re-run if tests themselves change
      - "backend/pyproject.toml"  # dependency changes
  pull_request:
    branches: [main]
    paths:
      - "backend/app/**"
      - "backend/tests/integration/**"
      - "backend/pyproject.toml"
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --frozen

      - name: Run integration tests
        working-directory: ./backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run pytest tests/integration -m "paid" -s --tb=short
