name: Evals (PR subset)

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/evals.yml"
  workflow_dispatch:

jobs:
  pr-subset:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run PR subset evals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run python evals/run_eval.py --config evals/backend/configs/pr_subset.yaml

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-pr-subset
          path: |
            backend/evals/backend/out/summary.json
            backend/evals/backend/out/results.jsonl
            backend/evals/backend/out/report.md