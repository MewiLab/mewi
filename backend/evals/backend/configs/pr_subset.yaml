suite: pr_subset

dataset:
  path: backend/evals/backend/datasets/pr_subset.jsonl

rubric:
  path: backend/evals/backend/rubrics/judge_rubric.md

runner:
  # "mock" = no API calls; useful for wiring CI first
  # "openai" = real LLM-as-judge
  mode: openai

openai:
  # Recommended: use a cheaper judge for PR gating
  model: gpt-5-mini
  temperature: 0
  max_output_tokens: 400

thresholds:
  # PR gate logic
  pass_rate_min: 0.85
  avg_score_min: 3.2
  schema_error_rate_max: 0.05

output:
  dir: backend/evals/backend/out