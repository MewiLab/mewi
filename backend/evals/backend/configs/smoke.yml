suite: smoke
dataset:
  path: backend/evals/backend/datasets/smoke.jsonl
rubric:
  path: backend/evals/backend/rubrics/judge_rubric.md
runner:
  mode: openai
openai:
  model: gpt-5-mini
  temperature: 0
  max_output_tokens: 300
thresholds:
  pass_rate_min: 0.90
  avg_score_min: 3.5
  schema_error_rate_max: 0.02
output:
  dir: backend/evals/backend/out