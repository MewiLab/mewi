services:
  agent-runtime:
    build: .
    container_name: mewi_agent_runtime
    restart: always
    env_file:
      - .env
    volumes:
      - .:/app          # Syncs your code
      - /app/.venv      # Protects the library folder
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"