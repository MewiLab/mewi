# ──────────────────────────────────────────────────────────────
# docker-compose.yml
#
# Two modes:
#   Local dev:  `make dev`  → starts Redis here, app runs natively
#   Deploy test: `make docker-up` → builds image + runs everything
# ──────────────────────────────────────────────────────────────

services:

  # ── Application (deploy profile only) ───────────────────────
  agent-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mewi_runtime
    profiles: [deploy]
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Infrastructure (always needed) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mewi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
