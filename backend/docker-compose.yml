# ──────────────────────────────────────────────────────────────
# docker-compose.yml
#
# Two modes:
#   Local dev:  `make dev`  → starts Redis here, app runs natively
#   Deploy test: `make docker-up` → builds image + runs everything
# ──────────────────────────────────────────────────────────────

services:

  # ── Infrastructure (always needed) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mewi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── App container (deploy / staging test only) ──────────────
  # Not used during daily development. Start with: make docker-up
  agent-runtime:
    build: .
    container_name: mewi_agent_runtime
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - deploy

volumes:
  redis_data: