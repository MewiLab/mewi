[project]
name = "backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.135.2",
    "openai>=2.24.0",
    "python-dotenv>=1.2.2",
    "pyyaml>=6.0.3",
    "redis>=7.3.0",
    "supabase>=2.28.3",
    "uvicorn>=0.42.0",
]

[dependency-groups]
dev = [
    "pytest-env>=1.6.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
# no env here — pytest-env handles it below

[tool.pytest_env]
SUPABASE_URL = "http://fake-supabase"
SUPABASE_PUBLISHABLE_KEY = "fake-anon-key"
SUPABASE_SECRET_KEY = "fake-service-role-key"
OPENAI_API_KEY = "fake-openai-key"
